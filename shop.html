<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — Stride</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <header>
        <nav>
            <a href="index.html" class="logo">Stride</a>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search shoes..." onkeyup="if(event.key === 'Enter') performSearch()">
                <button onclick="performSearch()" style="background:none;border:none;color:white;cursor:pointer;">🔍</button>
            </div>
        </nav>
    </header>

    <!-- SHOP SECTION -->
    <section id="shop">
        <h2>Our Collection</h2>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterCategory('all')">All</button>
            <button class="filter-btn" onclick="filterCategory('sneakers')">Sneakers</button>
            <button class="filter-btn" onclick="filterCategory('running')">Running</button>
            <button class="filter-btn" onclick="filterCategory('casual')">Casual</button>
        </div>
        
        <div class="products" id="productGrid">
            <!-- Products populated by JS -->
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div>
                <h3 style="font-size:1.8rem; margin-bottom:1rem;">Stride</h3>
                <p>Premium footwear for the modern mover.</p>
            </div>
            <div>
                <h4>Quick Links</h4>
                <p><a href="shop.html" style="color:white;">Shop</a></p>
                <p><a href="about.html" style="color:white;">About Us</a></p>
            </div>
            <div>
                <h4>Follow Us</h4>
                <p>Instagram • TikTok • Twitter</p>
            </div>
        </div>
        <p style="margin-top:3rem; opacity:0.7;">© 2026 Stride Store. All rights reserved.</p>
    </footer>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <h3>Added to Cart!</h3>
            <p id="modalProductName"></p>
            <button onclick="closeModal()" class="btn" style="margin-top:1rem;">Continue Shopping</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
